<section class="title">
        <h2>Contact me</h2>
        <p>If you want to contact me, please fill out the form below with your information and I will get back to you.</p>
      </section>
      <section class="formulario">
        <form>
          <label for="name">Name</label>
          <br/>
          <input
            type="text"
            name="name"
            placeholder="Write your name"
            required
          />
          <br/><br>
          <label for="number">Phone number</label>
          <br/>
          <input
            type="number"
            name="number"
            placeholder="Write your phone"
            required
          />
          <br/><br>
          <label for="mail">E-mail</label>
          <br/>
          <input
            type="email"
            name="mail"
            placeholder="Write your e-mail"
            required
          />
          <br/><br>
          <label for="text">Write me something</label>
          <br/>
          <input class="descrip"
            type="text"
            name="text"
            placeholder="Write something you want to tell me"
          />
          <br><br>
          <button class="btn_send" type="submit">Send</button>
        </form>
      </section>
